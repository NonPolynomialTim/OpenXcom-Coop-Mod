name = "openxcom-coop-signaling"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# SQLite-backed Durable Objects are available on the Workers FREE plan.
# (Classic key-value DOs require a paid plan; do not switch these back.)
[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DirectoryDO", "RoomDO"]
